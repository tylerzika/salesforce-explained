<template>
    <lightning-card title="Regional Sales Dashboard" icon-name="standard:dashboard">
        <div class="slds-p-around_medium">
            <!-- Region Selector -->
            <div class="slds-m-bottom_medium">
                <lightning-combobox
                    name="region"
                    label="Select Region"
                    value={selectedRegion}
                    placeholder="Choose Region"
                    options={regionOptions}
                    onchange={handleRegionChange}
                ></lightning-combobox>
            </div>

            <!-- Loading Spinner -->
            <template if:true={isLoading}>
                <div class="slds-text-align_center slds-p-around_large">
                    <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                </div>
            </template>

            <!-- Dashboard Data -->
            <template if:false={isLoading}>
                <div class="dashboard-container">
                    <template for:each={formattedData} for:item="data">
                        <div key={data.id} class="region-card slds-box slds-m-bottom_medium">
                            <div class="slds-grid slds-gutters">
                                <div class="slds-col slds-size_1-of-1">
                                    <h3 class="slds-text-heading_medium slds-m-bottom_small">
                                        {data.region}
                                    </h3>
                                </div>
                            </div>

                            <div class="slds-grid slds-gutters slds-wrap">
                                <!-- Quota and Actual -->
                                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                    <div class="metric-card">
                                        <div class="slds-text-color_weak slds-text-body_small">Quota</div>
                                        <div class="slds-text-heading_small">{data.quotaFormatted}</div>
                                    </div>
                                </div>

                                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                    <div class="metric-card">
                                        <div class="slds-text-color_weak slds-text-body_small">Actual</div>
                                        <div class="slds-text-heading_small">{data.actualFormatted}</div>
                                    </div>
                                </div>

                                <!-- Attainment -->
                                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                    <div class="metric-card">
                                        <div class="slds-text-color_weak slds-text-body_small">Attainment</div>
                                        <div class={data.attainmentClass}>
                                            <span class="slds-text-heading_small">{data.attainment}</span>
                                        </div>
                                    </div>
                                </div>

                                <!-- Pipeline -->
                                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                    <div class="metric-card">
                                        <div class="slds-text-color_weak slds-text-body_small">Pipeline</div>
                                        <div class="slds-text-heading_small">{data.pipelineFormatted}</div>
                                    </div>
                                </div>

                                <!-- Opportunities -->
                                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                    <div class="metric-card">
                                        <div class="slds-text-color_weak slds-text-body_small">Open Opps</div>
                                        <div class="slds-text-heading_small">{data.openOpportunities}</div>
                                    </div>
                                </div>

                                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4">
                                    <div class="metric-card">
                                        <div class="slds-text-color_weak slds-text-body_small">Closed Won</div>
                                        <div class="slds-text-heading_small slds-text-color_success">{data.closedWon}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
