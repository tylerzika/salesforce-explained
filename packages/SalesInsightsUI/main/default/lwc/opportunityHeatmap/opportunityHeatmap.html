<template>
    <lightning-card title="Opportunity Heatmap" icon-name="custom:custom63">
        <div class="slds-p-around_medium">
            <!-- Metric Selector -->
            <div class="slds-m-bottom_medium">
                <lightning-combobox
                    name="metric"
                    label="Select Metric"
                    value={selectedMetric}
                    placeholder="Choose Metric"
                    options={metricOptions}
                    onchange={handleMetricChange}
                ></lightning-combobox>
            </div>

            <!-- Loading Spinner -->
            <template if:true={isLoading}>
                <div class="slds-text-align_center slds-p-around_large">
                    <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                </div>
            </template>

            <!-- Heatmap -->
            <template if:false={isLoading}>
                <div class="heatmap-container">
                    <!-- Header Row -->
                    <div class="heatmap-header slds-grid">
                        <div class="header-cell region-label">Region</div>
                        <template for:each={stages} for:item="stage">
                            <div key={stage} class="header-cell">{stage}</div>
                        </template>
                    </div>

                    <!-- Data Rows -->
                    <template for:each={heatmapData} for:item="row">
                        <div key={row.region} class="heatmap-row slds-grid">
                            <div class="row-label">{row.region}</div>
                            <template for:each={row.stages} for:item="cell">
                                <div key={cell.stage} class={cell.intensity} data-value={cell.value}>
                                    <div class="cell-value">{cell.value}</div>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>

                <!-- Legend -->
                <div class="slds-m-top_medium">
                    <div class="legend-container slds-grid slds-grid_align-center">
                        <div class="legend-label slds-p-right_small">Intensity:</div>
                        <div class="legend-item">
                            <div class="legend-box intensity-very-low"></div>
                            <span class="slds-text-body_small">Low</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-box intensity-low"></div>
                        </div>
                        <div class="legend-item">
                            <div class="legend-box intensity-medium"></div>
                        </div>
                        <div class="legend-item">
                            <div class="legend-box intensity-medium-high"></div>
                        </div>
                        <div class="legend-item">
                            <div class="legend-box intensity-high"></div>
                            <span class="slds-text-body_small">High</span>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
